<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ons Receptenboek</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;1,600&family=JetBrains+Mono:wght@500;600&display=swap');

  :root{
    --bg: #FFF7E8;
    --surface: #FFFEFA;
    --surface-2: #FBF1DC;
    --ink: #2E2A22;
    --ink-soft: #6B6152;
    --basil: #1F6F5C;
    --basil-dark: #175347;
    --tomato: #D64545;
    --tomato-dark: #B33636;
    --mustard: #F2A93B;
    --mustard-dark: #C9821F;
    --line: #E7DCC3;
    --shadow: 0 6px 16px rgba(46,42,34,0.10);
    --radius: 18px;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(242,169,59,0.10) 0, transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(31,111,92,0.08) 0, transparent 45%);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  h1,h2,h3, .display{
    font-family: 'Baloo 2', cursive;
    color: var(--ink);
    margin: 0;
  }

  .mono{ font-family: 'JetBrains Mono', monospace; }

  button{ font-family: inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input, select, textarea{ font-family: inherit; font-size: 1rem; color: var(--ink); }

  .app-shell{
    max-width: 480px;
    margin: 0 auto;
    height: 100dvh;
    display:flex;
    flex-direction:column;
    background: var(--bg);
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  header.topbar{
    flex-shrink:0;
    padding: 18px 20px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
  }
  header.topbar .brand{ display:flex; align-items:center; gap:10px; }
  header.topbar .pot{ font-size: 1.6rem; }
  header.topbar h1{ font-size: 1.25rem; letter-spacing:0.2px; }
  header.topbar .sub{ font-size: 0.72rem; color: var(--ink-soft); margin-top:1px; }

  main.content{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px 90px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- Bottom nav ---------- */
  nav.bottomnav{
    flex-shrink:0;
    display:flex;
    justify-content:space-around;
    align-items:center;
    background: var(--surface);
    border-top: 1px solid var(--line);
    padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
    position: relative;
    z-index: 20;
  }
  nav.bottomnav .navbtn{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    padding: 6px 10px; border-radius: 12px; min-width: 58px;
    color: var(--ink-soft); font-size: 0.68rem; font-weight:700;
    transition: color .15s ease, background .15s ease;
  }
  nav.bottomnav .navbtn .ic{ font-size: 1.3rem; line-height:1; }
  nav.bottomnav .navbtn.active{ color: var(--basil); background: rgba(31,111,92,0.10); }
  nav.bottomnav .navbtn.addbtn{
    background: var(--tomato);
    color: #fff;
    width: 52px; height:52px; border-radius: 50%;
    margin-top: -26px;
    box-shadow: 0 6px 14px rgba(214,69,69,0.4);
    justify-content:center;
  }
  nav.bottomnav .navbtn.addbtn .ic{ font-size: 1.6rem; }
  nav.bottomnav .navbtn.addbtn span:last-child{ display:none; }

  /* ---------- Chips / pills ---------- */
  .chiprow{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin: 4px 0 16px; scrollbar-width:none; }
  .chiprow::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0; display:flex; align-items:center; gap:6px;
    background: var(--surface); border:1.5px solid var(--line);
    padding: 8px 14px; border-radius: 999px; font-weight:700; font-size:0.85rem;
    color: var(--ink); white-space:nowrap;
    transition: all .15s ease;
  }
  .chip.active{ background: var(--basil); border-color: var(--basil); color:#fff; }
  .chip .ic{ font-size:1rem; }

  /* ---------- Recipe card (index-card signature) ---------- */
  .cardgrid{ display:flex; flex-direction:column; gap:14px; }
  .rcard{
    position:relative;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 16px 14px;
    border: 1px solid var(--line);
    cursor:pointer;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .rcard:active{ transform: scale(0.98); }
  .rcard::before{
    content:"";
    position:absolute; top:0; left:18px; right:18px; height:2px;
    background-image: repeating-linear-gradient(90deg, var(--line) 0 8px, transparent 8px 16px);
  }
  .rcard .stamp{
    position:absolute; top:-10px; right:14px;
    background: var(--mustard); color:#fff;
    width:36px; height:36px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:1.1rem; box-shadow: 0 3px 8px rgba(242,169,59,0.5);
    transform: rotate(8deg);
  }
  .rcard .cat-label{
    font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
    color: var(--basil); margin-bottom:2px;
  }
  .rcard h3{ font-size:1.15rem; margin-bottom:6px; padding-right:34px; }
  .rcard .meta{ display:flex; gap:12px; flex-wrap:wrap; font-size:0.78rem; color: var(--ink-soft); margin-top:6px; }
  .rcard .meta span{ display:flex; align-items:center; gap:4px; }
  .rcard .ingr-preview{ font-size:0.82rem; color: var(--ink-soft); margin-top:8px; line-height:1.4; }
  .rcard .match-badge{
    position:absolute; bottom:-8px; left:14px;
    background: var(--tomato); color:#fff; font-size:0.68rem; font-weight:700;
    padding:3px 9px; border-radius:999px;
  }

  .emptystate{
    text-align:center; padding: 50px 20px; color: var(--ink-soft);
  }
  .emptystate .ic{ font-size:2.6rem; display:block; margin-bottom:10px; }
  .emptystate h3{ color: var(--ink); margin-bottom:6px; }

  .sectiontitle{ display:flex; align-items:baseline; justify-content:space-between; margin: 6px 0 12px; }
  .sectiontitle h2{ font-size:1.05rem; }
  .sectiontitle .count{ font-size:0.78rem; color:var(--ink-soft); font-weight:700; }

  .greeting{ margin-bottom: 4px; }
  .greeting h2{ font-size:1.35rem; }
  .greeting p{ margin:4px 0 0; color: var(--ink-soft); font-size:0.9rem; }

  /* ---------- Search bar ---------- */
  .searchbox{
    display:flex; align-items:center; gap:8px;
    background: var(--surface); border:1.5px solid var(--line); border-radius: 14px;
    padding: 10px 14px; margin-bottom: 14px;
  }
  .searchbox input{ border:none; outline:none; flex:1; background:transparent; font-size:0.95rem; }
  .searchbox .ic{ font-size:1.1rem; color: var(--ink-soft); }
  .hint{ font-size:0.78rem; color: var(--ink-soft); margin: -8px 0 14px 2px; }

  /* ---------- Forms ---------- */
  .field{ margin-bottom: 16px; }
  .field label{ display:block; font-weight:700; font-size:0.85rem; margin-bottom:6px; color: var(--ink); }
  .field .helptext{ font-size:0.75rem; color: var(--ink-soft); margin-top:4px; }
  .field input[type=text], .field input[type=number], .field select, .field textarea{
    width:100%; padding: 11px 13px; border-radius: 12px; border: 1.5px solid var(--line);
    background: var(--surface); outline:none; transition: border-color .15s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus{ border-color: var(--basil); }
  .field textarea{ min-height: 110px; resize:vertical; line-height:1.5; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .row3{ display:grid; grid-template-columns:1fr 1fr 0.9fr; gap:8px; }

  .ingr-line{ display:flex; gap:8px; align-items:flex-start; margin-bottom:10px; }
  .ingr-line .rm{
    flex-shrink:0; width:38px; height:38px; border-radius:10px; background: rgba(214,69,69,0.10);
    color: var(--tomato); font-size:1.2rem; display:flex; align-items:center; justify-content:center;
  }
  .addrow-btn{
    display:flex; align-items:center; gap:6px; color: var(--basil); font-weight:700; font-size:0.9rem;
    padding: 10px 4px; border-radius:10px;
  }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding: 13px 20px; border-radius: 14px; font-weight:700; font-size:0.95rem;
    width:100%; transition: transform .12s ease, opacity .15s ease;
  }
  .btn:active{ transform: scale(0.98); }
  .btn-primary{ background: var(--basil); color:#fff; box-shadow: 0 5px 12px rgba(31,111,92,0.35); }
  .btn-secondary{ background: var(--surface-2); color: var(--ink); border:1.5px solid var(--line); }
  .btn-danger{ background: rgba(214,69,69,0.10); color: var(--tomato); }
  .btn-ghost{ background:none; color: var(--ink-soft); }

  .catpicker{ display:flex; flex-wrap:wrap; gap:8px; }
  .catopt{
    padding: 9px 14px; border-radius:999px; border:1.5px solid var(--line); background: var(--surface);
    font-weight:700; font-size:0.85rem; display:flex; align-items:center; gap:6px;
  }
  .catopt.active{ background: var(--mustard); border-color: var(--mustard); color:#fff; }

  /* ---------- Modal (recipe detail) ---------- */
  .overlay{
    position:absolute; inset:0; background: rgba(46,42,34,0.45);
    display:flex; align-items:flex-end; z-index: 30;
    animation: fadeIn 0.18s ease;
  }
  .sheet{
    background: var(--bg); width:100%; max-height: 92%; border-radius: 24px 24px 0 0;
    overflow-y:auto; padding: 18px 18px calc(28px + env(safe-area-inset-bottom));
    box-shadow: 0 -8px 30px rgba(0,0,0,0.2);
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp{ from{ transform: translateY(24px); opacity:0.6; } to{ transform: translateY(0); opacity:1; } }
  .sheet .grabber{ width:44px; height:5px; background: var(--line); border-radius:99px; margin: 0 auto 14px; }
  .sheet-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:6px; }
  .sheet .cat-label{ font-size:0.72rem; font-weight:700; text-transform:uppercase; color: var(--basil); letter-spacing:0.06em; }
  .sheet h2{ font-size:1.5rem; margin: 4px 0 10px; }
  .closebtn{ font-size:1.3rem; color: var(--ink-soft); flex-shrink:0; padding:4px; }
  .badgerow{ display:flex; gap:8px; flex-wrap:wrap; margin: 6px 0 18px; }
  .badge{
    background: var(--surface-2); border:1px solid var(--line); border-radius:12px;
    padding: 8px 12px; font-size:0.8rem; font-weight:700; display:flex; align-items:center; gap:6px;
  }
  .sheet h3.subhead{ font-size:1rem; margin: 18px 0 10px; color: var(--basil); }
  .servingsrow{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background: var(--surface-2); border:1px solid var(--line); border-radius:14px;
    padding: 10px 14px; margin-top: 4px;
  }
  .servingslabel{ font-weight:700; font-size:0.88rem; }
  .servingsctrl{ display:flex; align-items:center; gap:8px; }
  .servingsctrl button{
    width:32px; height:32px; border-radius:50%; background: var(--basil); color:#fff;
    font-size:1.1rem; font-weight:700; display:flex; align-items:center; justify-content:center;
  }
  .servingsctrl input{
    width:44px; text-align:center; border:1.5px solid var(--line); border-radius:8px; padding:5px 2px;
    background: var(--surface); font-weight:700;
  }
  .sourcelink{
    display:inline-block; color: var(--basil); font-weight:700; font-size:0.88rem;
    word-break:break-all; text-decoration:underline;
  }
  .ingr-list{ list-style:none; padding:0; margin:0; }
  .ingr-list li{
    display:flex; justify-content:space-between; gap:10px; padding: 9px 0; border-bottom:1px dashed var(--line);
    font-size:0.92rem;
  }
  .ingr-list li .amt{ font-family:'JetBrains Mono', monospace; font-weight:600; color: var(--basil-dark); white-space:nowrap; }
  .steps-text{ white-space:pre-wrap; line-height:1.6; font-size:0.94rem; }
  .sheet-actions{ display:flex; gap:10px; margin-top: 22px; }

  /* ---------- Weekmenu ---------- */
  .weekcard{
    background: var(--surface); border:1px solid var(--line); border-radius:16px;
    padding: 14px 16px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:10px;
    box-shadow: var(--shadow);
  }
  .weekcard .day{ font-family:'Baloo 2', cursive; font-weight:700; font-size:0.78rem; color:var(--tomato); text-transform:uppercase; letter-spacing:0.04em; }
  .weekcard .rname{ font-size:1rem; font-weight:700; margin-top:2px; }
  .weekcard .rcat{ font-size:0.78rem; color:var(--ink-soft); }
  .weekcard .reroll{ font-size:1.2rem; padding:8px; color: var(--basil); flex-shrink:0; }

  .toast{
    position:absolute; bottom: 96px; left:50%; transform: translateX(-50%);
    background: var(--ink); color:#fff; padding: 11px 20px; border-radius: 999px;
    font-size:0.85rem; font-weight:700; box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    z-index: 40; animation: toastIn 0.25s ease;
    white-space:nowrap;
  }
  @keyframes toastIn{ from{ opacity:0; transform: translate(-50%, 10px); } to{ opacity:1; transform: translate(-50%,0); } }

  .loadingwrap{ display:flex; flex-direction:column; align-items:center; justify-content:center; height:60%; gap:10px; color: var(--ink-soft); }
  .spin{ font-size:2rem; animation: spin 1.2s linear infinite; }
  @keyframes spin{ to{ transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app-shell" id="app"></div>

<script>
(function(){

  var DEFAULT_CATEGORIES = [
    {name:"Pasta", icon:"🍝"},
    {name:"Kip", icon:"🍗"},
    {name:"Vlees", icon:"🥩"},
    {name:"Vis", icon:"🐟"},
    {name:"Vega", icon:"🥗"},
    {name:"Soep", icon:"🍲"},
    {name:"Salade", icon:"🥙"},
    {name:"Ontbijt", icon:"🥞"},
    {name:"Nagerecht", icon:"🍰"},
    {name:"Overig", icon:"🧺"}
  ];
  var UNIT_OPTIONS = ["gram","kg","ml","liter","stuks","tl","el","snufje","teentje","blikje","pakje","naar smaak"];

  var state = {
    tab: 'home',
    recipes: [],
    loading: true,
    storageOk: true,
    searchQuery: '',
    searchCategory: 'Alle',
    viewingId: null,
    editingId: null,
    formData: null,
    weekMenu: null,
    toastMsg: null,
    toastTimer: null
  };

  function uid(){ return 'r_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8); }

  function catIcon(name){
    var found = DEFAULT_CATEGORIES.find(function(c){ return c.name.toLowerCase() === (name||'').toLowerCase(); });
    return found ? found.icon : '🍽️';
  }

  function allCategories(){
    var names = DEFAULT_CATEGORIES.map(function(c){ return c.name; });
    state.recipes.forEach(function(r){
      (r.categories||[]).forEach(function(cat){
        if(cat && names.indexOf(cat) === -1) names.push(cat);
      });
    });
    return names;
  }

  function showToast(msg){
    state.toastMsg = msg;
    render();
    if(state.toastTimer) clearTimeout(state.toastTimer);
    state.toastTimer = setTimeout(function(){ state.toastMsg = null; render(); }, 2200);
  }

  /* ---------------- storage ---------------- */
  function waitForStorage(maxTries){
    // window.storage wordt door de omgeving ingeladen; als het script eerder
    // draait dan die koppeling klaar is, moeten we even wachten in plaats van
    // meteen te crashen (dat was de reden dat toevoegen/opslaan niet werkte).
    return new Promise(function(resolve, reject){
      var tries = 0;
      var maxAttempts = maxTries || 40; // ~8 sec bij 200ms
      (function check(){
        if(window.storage && typeof window.storage.get === 'function'){
          resolve();
          return;
        }
        tries++;
        if(tries >= maxAttempts){
          reject(new Error('storage niet beschikbaar'));
          return;
        }
        setTimeout(check, 200);
      })();
    });
  }

  function loadRecipes(){
    state.loading = true;
    render();
    waitForStorage().then(function(){
      return window.storage.get('family_recipes_v1', true);
    }).then(function(res){
      if(res && res.value){
        try{ state.recipes = JSON.parse(res.value); }catch(e){ state.recipes = []; }
      } else {
        state.recipes = [];
      }
      // migratie: oudere recepten hadden één 'category' (string) i.p.v. 'categories' (lijst)
      state.recipes.forEach(function(r){
        if(!r.categories){
          r.categories = r.category ? [r.category] : [];
        }
      });
      state.loading = false;
      render();
    }).catch(function(e){
      state.recipes = [];
      state.loading = false;
      state.storageOk = false;
      render();
      showToast('⚠️ Opslag niet beschikbaar, probeer de pagina te verversen');
    });
  }

  function persistRecipes(){
    return waitForStorage(10).then(function(){
      return window.storage.set('family_recipes_v1', JSON.stringify(state.recipes), true);
    }).catch(function(e){
      state.storageOk = false;
      showToast('⚠️ Opslaan mislukt, probeer opnieuw');
    });
  }

  /* ---------------- navigation ---------------- */
  function goTab(tab){
    state.tab = tab;
    state.viewingId = null;
    if(tab === 'add' && !state.editingId){
      state.formData = blankForm();
    }
    render();
  }
  window.goTab = goTab;

  function blankForm(){
    return {
      id: null,
      title: '',
      categories: [],
      showCustomInput: false,
      customCatInput: '',
      servings: 4,
      ingredients: [{name:'', amount:'', unit:'gram'}],
      steps: '',
      cookTime: '',
      ovenTemp: '',
      ovenTime: '',
      sourceUrl: ''
    };
  }

  /* ---------------- filtering ---------------- */
  function getFilteredRecipes(){
    var q = state.searchQuery.trim().toLowerCase();
    var words = q.length ? q.split(/[,\s]+/).filter(Boolean) : [];
    var cat = state.searchCategory;

    var list = state.recipes.filter(function(r){
      if(cat !== 'Alle' && (r.categories||[]).indexOf(cat) === -1) return false;
      return true;
    });

    if(words.length === 0) return list.map(function(r){ return {r:r, score:0}; });

    var scored = list.map(function(r){
      var haystack = (r.title + ' ' + (r.categories||[]).join(' ') + ' ' + r.ingredients.map(function(i){return i.name;}).join(' ')).toLowerCase();
      var score = 0;
      words.forEach(function(w){ if(haystack.indexOf(w) !== -1) score++; });
      return {r:r, score:score};
    }).filter(function(x){ return x.score > 0; });

    scored.sort(function(a,b){ return b.score - a.score; });
    return scored;
  }

  /* ---------------- render root ---------------- */
  function render(){
    var app = document.getElementById('app');
    var html = '';
    html += renderTopbar();
    html += '<main class="content" id="mainContent">';
    if(state.loading){
      html += '<div class="loadingwrap"><span class="spin">🍲</span><div>Recepten laden…</div></div>';
    } else if(state.tab === 'home'){
      html += renderHome();
    } else if(state.tab === 'search'){
      html += renderSearch();
    } else if(state.tab === 'add'){
      html += renderAddForm();
    } else if(state.tab === 'week'){
      html += renderWeekMenu();
    }
    html += '</main>';
    html += renderBottomNav();
    if(state.viewingId){
      html += renderDetailModal(state.viewingId);
    }
    if(state.toastMsg){
      html += '<div class="toast">' + escapeHtml(state.toastMsg) + '</div>';
    }
    app.innerHTML = html;
    attachDynamicHandlers();
  }

  function renderTopbar(){
    var titles = {
      home: ['Ons Receptenboek', "Alles wat we graag eten, bij elkaar"],
      search: ['Wat heb je in huis?', 'Filter op ingrediënt of gerecht'],
      add: [state.editingId ? 'Recept bewerken' : 'Nieuw recept', 'Deel het met de familie'],
      week: ['Weekmenu', 'Zeven dagen, geen stress']
    };
    var t = titles[state.tab] || titles.home;
    return '<header class="topbar"><div class="brand"><span class="pot">🍲</span><div><h1>' + t[0] + '</h1><div class="sub">' + t[1] + '</div></div></div></header>';
  }

  function renderBottomNav(){
    function item(tab, icon, label, extraClass){
      var active = state.tab === tab ? 'active' : '';
      return '<button class="navbtn ' + active + ' ' + (extraClass||'') + '" onclick="goTab(\'' + tab + '\')"><span class="ic">' + icon + '</span><span>' + label + '</span></button>';
    }
    return '<nav class="bottomnav">' +
      item('home','🏠','Home') +
      item('search','🔎','Zoeken') +
      item('add','➕','Toevoegen','addbtn') +
      item('week','📅','Weekmenu') +
      '</nav>';
  }

  /* ---------------- HOME ---------------- */
  function renderHome(){
    var h = '';
    h += '<div class="greeting"><h2>Hoi! 👋</h2><p>' + (state.recipes.length ? 'Je hebt samen al ' + state.recipes.length + ' recept' + (state.recipes.length===1?'':'en') + ' verzameld.' : 'Tijd om het eerste recept toe te voegen.') + '</p></div>';

    // category chips
    var cats = allCategories();
    h += '<div class="chiprow">';
    cats.forEach(function(c){
      h += '<button class="chip" onclick="openCategory(\'' + escapeAttr(c) + '\')"><span class="ic">' + catIcon(c) + '</span>' + escapeHtml(c) + '</button>';
    });
    h += '</div>';

    if(state.recipes.length === 0){
      h += '<div class="emptystate"><span class="ic">📖</span><h3>Nog helemaal leeg hier</h3><p>Voeg het eerste familierecept toe via de + knop onderin.</p></div>';
      return h;
    }

    var recent = state.recipes.slice().sort(function(a,b){ return (b.createdAt||0) - (a.createdAt||0); }).slice(0,6);
    h += '<div class="sectiontitle"><h2>Recent toegevoegd</h2><span class="count">' + recent.length + '</span></div>';
    h += '<div class="cardgrid">';
    recent.forEach(function(r){ h += renderRecipeCard(r); });
    h += '</div>';
    return h;
  }

  window.openCategory = function(cat){
    state.tab = 'search';
    state.searchCategory = cat;
    state.searchQuery = '';
    render();
  };

  /* ---------------- SEARCH / FILTER ---------------- */
  function renderSearch(){
    var h = '';
    h += '<div class="searchbox"><span class="ic">🔎</span><input type="text" id="searchInput" placeholder="bv. pasta, kip, boontjes" value="' + escapeAttr(state.searchQuery) + '" oninput="onSearchInput(this.value)"/></div>';
    h += '<div class="hint">Typ ingrediënten of een gerecht, gescheiden door een komma. We tonen de beste match bovenaan.</div>';

    var cats = ['Alle'].concat(allCategories());
    h += '<div class="chiprow">';
    cats.forEach(function(c){
      var active = state.searchCategory === c ? 'active' : '';
      h += '<button class="chip ' + active + '" onclick="setSearchCat(\'' + escapeAttr(c) + '\')">' + (c!=='Alle' ? '<span class="ic">'+catIcon(c)+'</span>' : '') + escapeHtml(c) + '</button>';
    });
    h += '</div>';

    var results = getFilteredRecipes();
    if(results.length === 0){
      h += '<div class="emptystate"><span class="ic">🥲</span><h3>Niks gevonden</h3><p>Probeer andere ingrediënten of een andere categorie.</p></div>';
      return h;
    }

    h += '<div class="cardgrid">';
    results.forEach(function(x){ h += renderRecipeCard(x.r, x.score > 0 ? x.score : null); });
    h += '</div>';
    return h;
  }

  window.onSearchInput = function(val){
    state.searchQuery = val;
    var mainEl = document.getElementById('mainContent');
    var scrollPos = mainEl ? mainEl.scrollTop : 0;
    render();
    var input = document.getElementById('searchInput');
    if(input){ input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
    var newMain = document.getElementById('mainContent');
    if(newMain) newMain.scrollTop = scrollPos;
  };
  window.setSearchCat = function(cat){ state.searchCategory = cat; render(); };

  /* ---------------- recipe card ---------------- */
  function renderRecipeCard(r, matchScore){
    var cats = (r.categories && r.categories.length) ? r.categories : ['Overig'];
    var catLabel = cats.map(function(c){ return catIcon(c) + ' ' + escapeHtml(c); }).join('  •  ');
    var ingrPreview = r.ingredients.map(function(i){ return i.name; }).filter(Boolean).slice(0,4).join(', ');
    if(r.ingredients.length > 4) ingrPreview += '…';
    var meta = '';
    if(r.cookTime) meta += '<span>⏱️ ' + escapeHtml(r.cookTime) + ' min</span>';
    if(r.ovenTemp) meta += '<span>🔥 ' + escapeHtml(r.ovenTemp) + '°C</span>';
    var matchBadge = (matchScore && matchScore > 0) ? '<div class="match-badge">' + matchScore + ' match' + (matchScore>1?'es':'') + '</div>' : '';
    return '<div class="rcard" onclick="viewRecipe(\'' + r.id + '\')">' +
      '<div class="stamp">' + catIcon(cats[0]) + '</div>' +
      '<div class="cat-label">' + catLabel + '</div>' +
      '<h3>' + escapeHtml(r.title) + '</h3>' +
      (ingrPreview ? '<div class="ingr-preview">' + escapeHtml(ingrPreview) + '</div>' : '') +
      (meta ? '<div class="meta">' + meta + '</div>' : '') +
      matchBadge +
      '</div>';
  }

  /* ---------------- ADD / EDIT FORM ---------------- */
  function renderAddForm(){
    var f = state.formData || blankForm();
    var h = '<div>';

    h += '<div class="field"><label>Naam van het gerecht</label>' +
      '<input type="text" id="f_title" placeholder="bv. Mama’s lasagne" value="' + escapeAttr(f.title) + '" oninput="updateForm(\'title\', this.value)"/></div>';

    h += '<div class="field"><label>Categorieën</label>' +
      '<div class="helptext" style="margin:-2px 0 8px;">Kies er één of meerdere, bv. Pasta én Vis.</div>' +
      '<div class="catpicker">';
    var catOptions = allCategories();
    f.categories.forEach(function(cat){ if(catOptions.indexOf(cat) === -1) catOptions.push(cat); });
    catOptions.forEach(function(catName){
      var active = f.categories.indexOf(catName) !== -1 ? 'active' : '';
      h += '<button type="button" class="catopt ' + active + '" onclick="toggleCategory(\'' + escapeAttr(catName) + '\')">' + catIcon(catName) + ' ' + escapeHtml(catName) + '</button>';
    });
    h += '<button type="button" class="catopt ' + (f.showCustomInput ? 'active' : '') + '" onclick="toggleCustomInput()">✏️ Anders</button>';
    h += '</div>';
    if(f.showCustomInput){
      h += '<div style="display:flex; gap:8px; margin-top:8px;">';
      h += '<input id="f_custom_cat" style="flex:1;" type="text" placeholder="Nieuwe categorie" value="' + escapeAttr(f.customCatInput) + '" oninput="updateForm(\'customCatInput\', this.value)" onkeydown="if(event.key===\'Enter\'){event.preventDefault(); addCustomCategory();}"/>';
      h += '<button type="button" class="btn btn-secondary" style="width:auto; padding:11px 16px;" onclick="addCustomCategory()">Toevoegen</button>';
      h += '</div>';
    }
    h += '</div>';

    h += '<div class="field"><label>Aantal personen</label>' +
      '<input type="number" inputmode="numeric" min="1" placeholder="bv. 4" value="' + escapeAttr(f.servings) + '" oninput="updateForm(\'servings\', this.value)"/>' +
      '<div class="helptext">De hoeveelheden hieronder gelden voor dit aantal personen. In het recept kun je later het aantal personen aanpassen — de hoeveelheden worden dan automatisch herberekend.</div></div>';

    h += '<div class="field"><label>Ingrediënten</label>';
    f.ingredients.forEach(function(ing, idx){
      h += '<div class="ingr-line">';
      h += '<div class="row3" style="flex:1;">';
      h += '<input type="text" placeholder="ingrediënt" value="' + escapeAttr(ing.name) + '" oninput="updateIngr(' + idx + ',\'name\',this.value)"/>';
      h += '<input type="text" inputmode="decimal" placeholder="hoeveelheid" value="' + escapeAttr(ing.amount) + '" oninput="updateIngr(' + idx + ',\'amount\',this.value)"/>';
      h += '<select onchange="updateIngr(' + idx + ',\'unit\',this.value)">';
      UNIT_OPTIONS.forEach(function(u){
        h += '<option value="' + u + '" ' + (ing.unit===u?'selected':'') + '>' + u + '</option>';
      });
      h += '</select>';
      h += '</div>';
      h += '<button type="button" class="rm" onclick="removeIngr(' + idx + ')">✕</button>';
      h += '</div>';
    });
    h += '<button type="button" class="addrow-btn" onclick="addIngr()">➕ Ingrediënt toevoegen</button>';
    h += '</div>';

    h += '<div class="field"><label>Bereidingswijze</label>' +
      '<textarea placeholder="Beschrijf stap voor stap hoe je het maakt…" oninput="updateForm(\'steps\', this.value)">' + escapeHtml(f.steps) + '</textarea></div>';

    h += '<div class="row2">';
    h += '<div class="field"><label>Kook-/bereidingstijd (min)</label><input type="number" inputmode="numeric" min="0" placeholder="bv. 25" value="' + escapeAttr(f.cookTime) + '" oninput="updateForm(\'cookTime\', this.value)"/></div>';
    h += '<div class="field"><label>Oventemperatuur (°C)</label><input type="number" inputmode="numeric" min="0" placeholder="bv. 180" value="' + escapeAttr(f.ovenTemp) + '" oninput="updateForm(\'ovenTemp\', this.value)"/></div>';
    h += '</div>';
    h += '<div class="field"><label>Oventijd (min, optioneel)</label><input type="number" inputmode="numeric" min="0" placeholder="bv. 30" value="' + escapeAttr(f.ovenTime) + '" oninput="updateForm(\'ovenTime\', this.value)"/></div>';

    h += '<div class="field"><label>Link naar origineel recept (optioneel)</label>' +
      '<input type="text" inputmode="url" placeholder="https://…" value="' + escapeAttr(f.sourceUrl) + '" oninput="updateForm(\'sourceUrl\', this.value)"/></div>';

    h += '<button class="btn btn-primary" onclick="submitRecipe()">' + (state.editingId ? '💾 Wijzigingen opslaan' : '✅ Recept toevoegen') + '</button>';
    if(state.editingId){
      h += '<div style="height:10px"></div><button class="btn btn-danger" onclick="deleteRecipe(\'' + state.editingId + '\')">🗑️ Recept verwijderen</button>';
    }
    h += '</div>';
    return h;
  }

  window.updateForm = function(field, value){
    if(!state.formData) state.formData = blankForm();
    state.formData[field] = value;
    // don't full re-render on every keystroke of text fields to keep focus - but keep simple app, re-render minimal fields only for textarea/title we skip full render
  };
  window.toggleCategory = function(catName){
    if(!state.formData) state.formData = blankForm();
    var idx = state.formData.categories.indexOf(catName);
    if(idx === -1) state.formData.categories.push(catName);
    else state.formData.categories.splice(idx, 1);
    render();
  };
  window.toggleCustomInput = function(){
    if(!state.formData) state.formData = blankForm();
    state.formData.showCustomInput = !state.formData.showCustomInput;
    render();
    if(state.formData.showCustomInput){
      setTimeout(function(){
        var input = document.getElementById('f_custom_cat');
        if(input) input.focus();
      }, 0);
    }
  };
  window.addCustomCategory = function(){
    if(!state.formData) return;
    var val = (state.formData.customCatInput || '').trim();
    if(!val) return;
    if(state.formData.categories.indexOf(val) === -1){
      state.formData.categories.push(val);
    }
    state.formData.customCatInput = '';
    state.formData.showCustomInput = false;
    render();
  };
  window.updateIngr = function(idx, field, value){
    if(!state.formData) return;
    state.formData.ingredients[idx][field] = value;
  };
  window.addIngr = function(){
    if(!state.formData) state.formData = blankForm();
    state.formData.ingredients.push({name:'', amount:'', unit:'gram'});
    render();
  };
  window.removeIngr = function(idx){
    if(!state.formData) return;
    state.formData.ingredients.splice(idx,1);
    if(state.formData.ingredients.length === 0) state.formData.ingredients.push({name:'', amount:'', unit:'gram'});
    render();
  };

  window.submitRecipe = function(){
    var f = state.formData;
    if(!f.title || !f.title.trim()){ showToast('⚠️ Geef het gerecht een naam'); return; }
    if(!f.categories || f.categories.length === 0){ showToast('⚠️ Kies minstens één categorie'); return; }
    var cleanIngr = f.ingredients.filter(function(i){ return i.name && i.name.trim(); });
    if(cleanIngr.length === 0){ showToast('⚠️ Voeg minstens één ingrediënt toe'); return; }
    if(!f.steps || !f.steps.trim()){ showToast('⚠️ Beschrijf de bereidingswijze'); return; }

    var servingsNum = parseFloat(f.servings);
    if(!servingsNum || servingsNum < 1) servingsNum = 4;

    var recipeObj = {
      id: f.id || uid(),
      title: f.title.trim(),
      categories: f.categories.slice(),
      servings: servingsNum,
      ingredients: cleanIngr,
      steps: f.steps.trim(),
      cookTime: (f.cookTime || '').toString().trim(),
      ovenTemp: (f.ovenTemp || '').toString().trim(),
      ovenTime: (f.ovenTime || '').toString().trim(),
      sourceUrl: (f.sourceUrl || '').toString().trim(),
      createdAt: f.id ? (state.recipes.find(function(r){return r.id===f.id;})||{}).createdAt || Date.now() : Date.now()
    };

    if(f.id){
      var idx = state.recipes.findIndex(function(r){ return r.id === f.id; });
      if(idx !== -1) state.recipes[idx] = recipeObj;
    } else {
      state.recipes.push(recipeObj);
    }

    persistRecipes().then(function(){
      showToast(f.id ? '💾 Recept bijgewerkt!' : '✅ Recept toegevoegd!');
    });

    state.editingId = null;
    state.formData = blankForm();
    state.tab = 'home';
    render();
  };

  window.deleteRecipe = function(id){
    if(!confirm('Weet je zeker dat je dit recept wilt verwijderen?')) return;
    state.recipes = state.recipes.filter(function(r){ return r.id !== id; });
    persistRecipes().then(function(){ showToast('🗑️ Recept verwijderd'); });
    state.editingId = null;
    state.viewingId = null;
    state.tab = 'home';
    render();
  };

  window.editRecipe = function(id){
    var r = state.recipes.find(function(x){ return x.id === id; });
    if(!r) return;
    state.formData = {
      id: r.id,
      title: r.title,
      categories: (r.categories && r.categories.length ? r.categories : (r.category ? [r.category] : [])).slice(),
      showCustomInput: false,
      customCatInput: '',
      servings: r.servings || 4,
      ingredients: r.ingredients.map(function(i){ return {name:i.name, amount:i.amount, unit:i.unit}; }),
      steps: r.steps,
      cookTime: r.cookTime || '',
      ovenTemp: r.ovenTemp || '',
      ovenTime: r.ovenTime || '',
      sourceUrl: r.sourceUrl || ''
    };
    state.editingId = r.id;
    state.viewingId = null;
    state.tab = 'add';
    render();
  };

  /* ---------------- DETAIL MODAL ---------------- */
  window.viewRecipe = function(id){
    state.viewingId = id;
    var r = state.recipes.find(function(x){ return x.id === id; });
    state.viewServings = (r && r.servings) || 4;
    render();
  };
  window.closeDetail = function(){ state.viewingId = null; render(); };

  window.setViewServings = function(delta){
    var next = (state.viewServings || 1) + delta;
    if(next < 1) next = 1;
    state.viewServings = next;
    render();
  };
  window.setViewServingsInput = function(val){
    var num = parseFloat(val);
    if(!num || num < 1) num = 1;
    state.viewServings = num;
    render();
  };

  function scaleAmount(amount, factor){
    var num = parseFloat((amount||'').toString().replace(',', '.'));
    if(isNaN(num)) return amount; // niet-numerieke hoeveelheden (bv. "naar smaak") blijven ongewijzigd
    var scaled = num * factor;
    var rounded = Math.round(scaled * 100) / 100;
    // trailing nullen netjes weghalen
    return rounded.toString().replace('.', ',');
  }

  function renderDetailModal(id){
    var r = state.recipes.find(function(x){ return x.id === id; });
    if(!r) return '';
    var h = '<div class="overlay" onclick="if(event.target===this) closeDetail()">';
    h += '<div class="sheet">';
    h += '<div class="grabber"></div>';
    var modalCats = (r.categories && r.categories.length) ? r.categories : ['Overig'];
    var modalCatLabel = modalCats.map(function(c){ return catIcon(c) + ' ' + escapeHtml(c); }).join('  •  ');
    h += '<div class="sheet-top"><div><div class="cat-label">' + modalCatLabel + '</div><h2>' + escapeHtml(r.title) + '</h2></div><button class="closebtn" onclick="closeDetail()">✕</button></div>';

    var badges = '';
    if(r.cookTime) badges += '<div class="badge">⏱️ ' + escapeHtml(r.cookTime) + ' min</div>';
    if(r.ovenTemp) badges += '<div class="badge">🔥 Oven ' + escapeHtml(r.ovenTemp) + '°C</div>';
    if(r.ovenTime) badges += '<div class="badge">⏳ ' + escapeHtml(r.ovenTime) + ' min in oven</div>';
    if(badges) h += '<div class="badgerow">' + badges + '</div>';

    var baseServings = r.servings || 4;
    var viewServings = state.viewServings || baseServings;
    var factor = viewServings / baseServings;

    h += '<div class="servingsrow"><span class="servingslabel">🍽️ Aantal personen</span><div class="servingsctrl">' +
      '<button type="button" onclick="setViewServings(-1)">−</button>' +
      '<input type="number" min="1" inputmode="numeric" value="' + viewServings + '" onchange="setViewServingsInput(this.value)"/>' +
      '<button type="button" onclick="setViewServings(1)">+</button>' +
      '</div></div>';

    h += '<h3 class="subhead">🧺 Ingrediënten</h3><ul class="ingr-list">';
    r.ingredients.forEach(function(i){
      var amt = factor === 1 ? (i.amount||'') : scaleAmount(i.amount, factor);
      h += '<li><span>' + escapeHtml(i.name) + '</span><span class="amt">' + escapeHtml(amt) + ' ' + escapeHtml(i.unit||'') + '</span></li>';
    });
    h += '</ul>';

    h += '<h3 class="subhead">👩‍🍳 Bereiding</h3><div class="steps-text">' + escapeHtml(r.steps) + '</div>';

    if(r.sourceUrl){
      h += '<h3 class="subhead">🔗 Origineel recept</h3><a class="sourcelink" href="' + escapeAttr(r.sourceUrl) + '" target="_blank" rel="noopener">' + escapeHtml(r.sourceUrl) + '</a>';
    }

    h += '<div class="sheet-actions">';
    h += '<button class="btn btn-secondary" onclick="editRecipe(\'' + r.id + '\')">✏️ Bewerken</button>';
    h += '<button class="btn btn-danger" onclick="deleteRecipe(\'' + r.id + '\')">🗑️ Verwijderen</button>';
    h += '</div>';

    h += '</div></div>';
    return h;
  }

  /* ---------------- WEEKMENU ---------------- */
  function renderWeekMenu(){
    var h = '';
    if(state.recipes.length === 0){
      h += '<div class="emptystate"><span class="ic">📅</span><h3>Nog geen recepten</h3><p>Voeg eerst een paar recepten toe, dan kan ik een weekmenu voorstellen.</p></div>';
      return h;
    }
    if(!state.weekMenu){
      h += '<div class="emptystate"><span class="ic">🎲</span><h3>Nog geen ideeën?</h3><p>Laat me een weekmenu voorstellen op basis van jullie recepten.</p></div>';
      h += '<button class="btn btn-primary" onclick="generateWeekMenu()">✨ Genereer weekmenu</button>';
      return h;
    }
    var days = ['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag','Zondag'];
    state.weekMenu.forEach(function(recipeId, idx){
      var r = state.recipes.find(function(x){ return x.id === recipeId; });
      if(!r) return;
      var weekCats = (r.categories && r.categories.length) ? r.categories : ['Overig'];
      h += '<div class="weekcard" onclick="viewRecipe(\'' + r.id + '\')">' +
        '<div><div class="day">' + days[idx] + '</div><div class="rname">' + escapeHtml(r.title) + '</div><div class="rcat">' + catIcon(weekCats[0]) + ' ' + escapeHtml(weekCats.join(', ')) + '</div></div>' +
        '<button class="reroll" onclick="event.stopPropagation(); rerollDay(' + idx + ')">🔄</button>' +
        '</div>';
    });
    h += '<div style="height:6px"></div>';
    h += '<button class="btn btn-secondary" onclick="generateWeekMenu()">🎲 Helemaal opnieuw</button>';
    return h;
  }

  window.generateWeekMenu = function(){
    var pool = state.recipes.map(function(r){ return r.id; });
    var menu = [];
    for(var i=0;i<7;i++){
      if(pool.length === 0){
        pool = state.recipes.map(function(r){ return r.id; }); // allow repeats if not enough recipes
      }
      var randIdx = Math.floor(Math.random()*pool.length);
      menu.push(pool[randIdx]);
      pool.splice(randIdx,1);
    }
    state.weekMenu = menu;
    render();
  };
  window.rerollDay = function(dayIdx){
    var used = state.weekMenu.filter(function(id, i){ return i !== dayIdx; });
    var options = state.recipes.map(function(r){return r.id;}).filter(function(id){ return used.indexOf(id) === -1; });
    if(options.length === 0) options = state.recipes.map(function(r){return r.id;});
    state.weekMenu[dayIdx] = options[Math.floor(Math.random()*options.length)];
    render();
  };

  /* ---------------- helpers ---------------- */
  function escapeHtml(str){
    if(str === undefined || str === null) return '';
    return String(str).replace(/[&<>"']/g, function(m){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
    });
  }
  function escapeAttr(str){ return escapeHtml(str); }

  function attachDynamicHandlers(){
    // no-op placeholder; all handlers are inline via global window functions
  }

  /* ---------------- init ---------------- */
  toonRecepten();

})();
</script>
  <form onsubmit="voegReceptToe(titel.value, ingredienten.value, bereiding.value); return false;">
    <input name="titel" placeholder="Titel">
    <textarea name="ingredienten" placeholder="Ingrediënten"></textarea>
    <textarea name="bereiding" placeholder="Bereiding"></textarea>
    <button type="submit">Opslaan</button>
</form>

<div id="recepten-lijst"></div>

<script>
let recepten = JSON.parse(localStorage.getItem("recepten")) || [];

function voegReceptToe(titel, ingredienten, bereiding) {
    recepten.push({ titel, ingredienten, bereiding });
    localStorage.setItem("recepten", JSON.stringify(recepten));
    toonRecepten();
}

function toonRecepten() {
    const lijst = document.getElementById("recepten-lijst");
    lijst.innerHTML = "";
    recepten.forEach(r => {
        lijst.innerHTML += `
            <div class="recept">
                <h3>${r.titel}</h3>
                <p><strong>Ingrediënten:</strong> ${r.ingredienten}</p>
                <p><strong>Bereiding:</strong> ${r.bereiding}</p>
            </div>
        `;
    });
}

toonRecepten();
</script>

</body>
</html>
